<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>pi-led admin</title>
  <style>
    body { margin: 0; background: #111; color: #ddd; font-family: system-ui, sans-serif;
           display: flex; flex-direction: column; align-items: center; gap: 1.5rem; padding: 2rem; }
    .card { background: #1b1b1b; border: 1px solid #333; border-radius: 8px; padding: 1.25rem 1.5rem; width: min(420px, 92vw); }
    h1 { margin: 0; font-size: 1.3rem; }
    h2 { margin: 0 0 .75rem; font-size: 1rem; color: #9af; }
    .views { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    button { font: inherit; padding: .6rem .8rem; border-radius: 6px; border: 1px solid #444;
             background: #262626; color: #ddd; cursor: pointer; }
    button:hover { border-color: #6cf; }
    button.active { background: #1d4ed8; border-color: #1d4ed8; color: #fff; }
    label { display: block; margin: .5rem 0 .25rem; font-size: .85rem; color: #aaa; }
    input[type=text], select { width: 100%; box-sizing: border-box; padding: .5rem;
             background: #0e0e0e; border: 1px solid #444; border-radius: 6px; color: #eee; font: inherit; }
    .row { display: flex; gap: .6rem; }
    .row > * { flex: 1; }
    img { image-rendering: pixelated; border: 3px solid #333; border-radius: 6px; display: block; margin: 0 auto; }
    a { color: #6cf; }
    form { margin: 0; }
  </style>
</head>
<body>
  <h1>pi-led admin</h1>

  <div class="card">
    <h2>Active view</h2>
    <div class="views">
      {% for v in catalog %}
      <form method="post" action="/admin/view">
        <input type="hidden" name="view" value="{{ v.key }}" />
        <button type="submit" class="{{ 'active' if v.key == active else '' }}" style="width:100%">{{ v.label }}</button>
      </form>
      {% endfor %}
    </div>
  </div>

  <div class="card">
    <h2>Message</h2>
    <form method="post" action="/admin/messages">
      <label for="text">Text</label>
      <input type="text" id="text" name="text" value="{{ message_cfg.get('text', '') }}" maxlength="120" />
      <div class="row">
        <div>
          <label for="color">Color</label>
          <select id="color" name="color">
            {% for c in colors %}
            <option value="{{ c }}" {{ 'selected' if c == message_cfg.get('color', 'white') else '' }}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="viz">Animation</label>
          <select id="viz" name="viz">
            {% for v in viz_choices %}
            <option value="{{ v }}" {{ 'selected' if v == message_cfg.get('viz', 'solid') else '' }}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="row" style="margin-top:.7rem">
        <button type="submit">Save</button>
        <button type="submit" name="activate" value="1">Save &amp; show</button>
      </div>
    </form>
  </div>

  <div class="card">
    <h2>Live preview</h2>
    <img id="frame" src="/led-preview.png" width="{{ 64 * scale }}" height="{{ 64 * scale }}" alt="LED preview" />
    <p style="text-align:center; margin:.75rem 0 0;"><a href="/preview">full preview →</a></p>
  </div>

  <script>
    const img = document.getElementById('frame');
    setInterval(() => { img.src = '/led-preview.png?t=' + Date.now(); }, 250);
  </script>
</body>
</html>
