<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>pi-led · preview</title>
  <style>
    :root {
      --bg: #0c0d11; --card: #15171e; --card-2: #1b1e27; --border: #272b36;
      --text: #eceef3; --muted: #8b93a7; --accent: #ff7a18; --blue: #3b82f6; --live: #22c55e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--text);
      background: radial-gradient(120% 80% at 50% -10%, #15171f 0%, var(--bg) 60%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 24px; }
    header { display: flex; align-items: center; gap: 8px; }
    header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    header h1 { margin: 0; font-size: 1.15rem; letter-spacing: .5px; }
    .live-tag { display: inline-flex; align-items: center; gap: 7px; color: var(--live);
      font-size: .74rem; letter-spacing: .14em; text-transform: uppercase; }
    .live-tag .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--live); animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)} 70%{box-shadow:0 0 0 7px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    @media (prefers-reduced-motion: reduce) { .live-tag .pulse { animation: none; } }
    img { image-rendering: pixelated; width: min(86vw, 520px); aspect-ratio: 1 / 1;
      border-radius: 14px; border: 1px solid #000; outline: 1px solid var(--border);
      box-shadow: 0 0 0 5px #0a0b0e, 0 18px 50px rgba(0,0,0,.6); background: #000; }
    a { color: var(--blue); text-decoration: none; font-size: .9rem; }
  </style>
</head>
<body>
  <header><span class="dot"></span><h1>pi-led</h1></header>
  <span class="live-tag"><span class="pulse"></span> Live on panel</span>
  <img id="frame" src="/led-preview.png" alt="LED panel preview" />
  <a href="/admin">← Open control</a>
  <script>
    const img = document.getElementById('frame');
    setInterval(() => { img.src = '/led-preview.png?t=' + Date.now(); }, 200);
  </script>
</body>
</html>
